<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <link rel="stylesheet" href="style.css">
   <link rel="shortcut icon" href="favicon image.png" type="image/x-icon">
</head>
<body>

    <div class="calculator">
    <input type="text" id="display" readonly value="0">
    
    <div class="buttons">
        <button class="btn" onclick="appendNumber('7')">7</button>
        <button class="btn" onclick="appendNumber('8')">8</button>
        <button class="btn" onclick="appendNumber('9')">9</button>
        <button class="btn operator" onclick="chooseOperator('/')">/</button> <button class="btn" onclick="appendNumber('4')">4</button>
        <button class="btn" onclick="appendNumber('5')">5</button>
        <button class="btn" onclick="appendNumber('6')">6</button>
        <button class="btn operator" onclick="chooseOperator('*')">x</button> <button class="btn" onclick="appendNumber('1')">1</button>
        <button class="btn" onclick="appendNumber('2')">2</button>
        <button class="btn" onclick="appendNumber('3')">3</button>
        <button class="btn operator" onclick="chooseOperator('-')">-</button>

        <button class="btn clear" onclick="clearDisplay()">C</button>
        <button class="btn" onclick="appendNumber('0')">0</button>
        <button class="btn operator" onclick="compute()">=</button>
        <button class="btn operator" onclick="chooseOperator('+')">+</button>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
